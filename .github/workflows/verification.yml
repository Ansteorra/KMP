name: Nightly / UAT Verification

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to verify for nightly/UAT promotion
        required: false
        default: main

concurrency:
  group: nightly-uat-verification-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-bundle:
    name: Verification bundle
    runs-on: ubuntu-latest

    services:
      database:
        image: mariadb:10
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: kmp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_mysql, gd, apcu, yaml
          ini-values: apc.enable_cli=1
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create test .env
        run: |
          printf "%s\n" \
            "export MYSQL_HOST='127.0.0.1'" \
            "export MYSQL_USERNAME='root'" \
            "export MYSQL_PASSWORD='root'" \
            "export MYSQL_DB_NAME='kmp'" \
            "export EMAIL_SMTP_HOST='localhost'" \
            "export EMAIL_SMTP_PORT='1025'" \
            "export EMAIL_SMTP_USERNAME=''" \
            "export EMAIL_SMTP_PASSWORD=''" \
            > app/config/.env

      - name: Create app_local.php
        run: |
          cat > app/config/app_local.php << 'APPLOCAL'
          <?php
          return [
              'debug' => true,
              'Security' => [
                  'salt' => env('SECURITY_SALT', 'ci-verification-bundle-salt'),
              ],
              'Datasources' => [
                  'default' => [
                      'driver' => \Cake\Database\Driver\Mysql::class,
                      'host' => env('MYSQL_HOST', '127.0.0.1'),
                      'port' => '3306',
                      'username' => env('MYSQL_USERNAME'),
                      'password' => env('MYSQL_PASSWORD'),
                      'database' => env('MYSQL_DB_NAME'),
                      'url' => env('DATABASE_URL', null),
                  ],
                  'test' => [
                      'driver' => \Cake\Database\Driver\Mysql::class,
                      'host' => env('MYSQL_HOST', '127.0.0.1'),
                      'port' => '3306',
                      'username' => env('MYSQL_USERNAME'),
                      'password' => env('MYSQL_PASSWORD'),
                      'database' => env('MYSQL_DB_NAME') . '_test',
                      'url' => env('DATABASE_URL', null),
                  ],
              ],
              'EmailTransport' => [
                  'default' => [
                      'host' => 'localhost',
                      'port' => 1025,
                      'username' => null,
                      'password' => null,
                      'client' => null,
                      'url' => env('EMAIL_TRANSPORT_DEFAULT_URL', null),
                  ],
              ],
          ];
          APPLOCAL

      - name: Install Composer dependencies
        run: cd app && composer install --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: cd app && npm install --no-audit --no-fund

      - name: Ensure databases exist
        run: mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS kmp; CREATE DATABASE IF NOT EXISTS kmp_test;"

      - name: Run verification bundle
        run: |
          set -o pipefail
          mkdir -p test-results
          cd app
          bash bin/verify.sh | tee ../test-results/verify.log

      - name: Upload verification logs
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-bundle-logs
          path: test-results/verify.log

  playwright-uat:
    name: Playwright UAT regression
    needs: verify-bundle
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
      PLAYWRIGHT_MAILPIT_URL: http://127.0.0.1:8025
      PLAYWRIGHT_WEB_SERVER_COMMAND: php -S 127.0.0.1:8080 -t webroot webroot/index.php

    services:
      database:
        image: mariadb:10
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: kmp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
        env:
          MP_SMTP_AUTH_ACCEPT_ANY: "true"
          MP_SMTP_AUTH_ALLOW_INSECURE: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_mysql, gd, apcu, yaml
          ini-values: apc.enable_cli=1
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create test .env
        run: |
          printf "%s\n" \
            "export MYSQL_HOST='127.0.0.1'" \
            "export MYSQL_USERNAME='root'" \
            "export MYSQL_PASSWORD='root'" \
            "export MYSQL_DB_NAME='kmp'" \
            "export EMAIL_SMTP_HOST='localhost'" \
            "export EMAIL_SMTP_PORT='1025'" \
            "export EMAIL_SMTP_USERNAME=''" \
            "export EMAIL_SMTP_PASSWORD=''" \
            > app/config/.env

      - name: Create app_local.php
        run: |
          cat > app/config/app_local.php << 'APPLOCAL'
          <?php
          return [
              'debug' => true,
              'Security' => [
                  'salt' => env('SECURITY_SALT', 'ci-uat-playwright-salt'),
              ],
              'Datasources' => [
                  'default' => [
                      'driver' => \Cake\Database\Driver\Mysql::class,
                      'host' => env('MYSQL_HOST', '127.0.0.1'),
                      'port' => '3306',
                      'username' => env('MYSQL_USERNAME'),
                      'password' => env('MYSQL_PASSWORD'),
                      'database' => env('MYSQL_DB_NAME'),
                      'url' => env('DATABASE_URL', null),
                  ],
                  'test' => [
                      'driver' => \Cake\Database\Driver\Mysql::class,
                      'host' => env('MYSQL_HOST', '127.0.0.1'),
                      'port' => '3306',
                      'username' => env('MYSQL_USERNAME'),
                      'password' => env('MYSQL_PASSWORD'),
                      'database' => env('MYSQL_DB_NAME') . '_test',
                      'url' => env('DATABASE_URL', null),
                  ],
              ],
              'EmailTransport' => [
                  'default' => [
                      'host' => 'localhost',
                      'port' => 1025,
                      'username' => null,
                      'password' => null,
                      'client' => null,
                      'url' => env('EMAIL_TRANSPORT_DEFAULT_URL', null),
                  ],
              ],
          ];
          APPLOCAL

      - name: Install Composer dependencies
        run: cd app && composer install --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: cd app && npm install --no-audit --no-fund

      - name: Ensure databases exist
        run: mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS kmp; CREATE DATABASE IF NOT EXISTS kmp_test;"

      - name: Wait for Mailpit
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8025/api/v1/info >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Mailpit did not become ready on http://127.0.0.1:8025" >&2
          exit 1

      - name: Install Playwright browser
        run: cd app && npx playwright install --with-deps chromium

      - name: Run Playwright UAT regression
        run: cd app && npm run test:ui:uat

      - name: Upload Playwright UAT artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-uat-artifacts
          path: |
            app/tests/ui-reports
            app/tests/ui-results
