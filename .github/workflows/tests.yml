name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  packages: read

jobs:
  phpunit:
    name: PHPUnit (${{ matrix.database.type }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        database:
          - type: mysql
            image: mariadb:10
            port: 3306
            driver: Cake\Database\Driver\Mysql
            php_extensions: mbstring, intl, pdo_mysql, gd, apcu, grpc, protobuf, yaml
            health_cmd: healthcheck.sh --connect --innodb_initialized
            env:
              MARIADB_ROOT_PASSWORD: root
              MARIADB_DATABASE: kmp_test
          - type: postgres
            image: postgres:16
            port: 5432
            driver: Cake\Database\Driver\Postgres
            php_extensions: mbstring, intl, pdo_pgsql, gd, apcu, grpc, protobuf, yaml
            health_cmd: pg_isready -U root -d kmp_test
            env:
              POSTGRES_USER: root
              POSTGRES_PASSWORD: root
              POSTGRES_DB: kmp_test

    services:
      database:
        image: ${{ matrix.database.image }}
        env: ${{ matrix.database.env }}
        ports:
          - ${{ matrix.database.port }}:${{ matrix.database.port }}
        options: >-
          --health-cmd="${{ matrix.database.health_cmd }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ${{ matrix.database.php_extensions }}
          ini-values: apc.enable_cli=1
          coverage: none

      - name: Setup Node.js
        if: matrix.database.type == 'mysql'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create test .env
        run: |
          printf "%s\n" \
            "export KMP_ENV='ci'" \
            "export CACHE_ENGINE='apcu'" \
            "export KMP_SESSION_DEFAULTS='php'" \
            "export MYSQL_USERNAME='root'" \
            "export MYSQL_PASSWORD='root'" \
            "export MYSQL_DB_NAME='kmp'" \
            "export EMAIL_SMTP_HOST='localhost'" \
            "export EMAIL_SMTP_PORT='1025'" \
            "export EMAIL_SMTP_USERNAME=''" \
            "export EMAIL_SMTP_PASSWORD=''" \
            > app/config/.env

      - name: Create app_local.php
        run: |
          cat > app/config/app_local.php << 'APPLOCAL'
          <?php
          // CI database driver is selected via matrix: mysql or postgres
          return [
              'debug' => true,
              'Security' => [
                  'salt' => env('SECURITY_SALT', 'ci-test-salt-not-for-production-use-only-for-ci'),
              ],
              'Datasources' => [
                  'default' => [
                      'driver' => \${{ matrix.database.driver }}::class,
                      'host' => '127.0.0.1',
                      'port' => '${{ matrix.database.port }}',
                      'username' => env('MYSQL_USERNAME'),
                      'password' => env('MYSQL_PASSWORD'),
                      'database' => env('MYSQL_DB_NAME'),
                      'url' => env('DATABASE_URL', null),
                  ],
                  'test' => [
                      'driver' => \${{ matrix.database.driver }}::class,
                      'host' => '127.0.0.1',
                      'port' => '${{ matrix.database.port }}',
                      'username' => env('MYSQL_USERNAME'),
                      'password' => env('MYSQL_PASSWORD'),
                      'database' => env('MYSQL_DB_NAME') . '_test',
                      'url' => env('DATABASE_URL', null),
                  ],
              ],
              'EmailTransport' => [
                  'default' => [
                      'host' => 'localhost',
                      'port' => 1025,
                      'username' => null,
                      'password' => null,
                      'client' => null,
                      'url' => env('EMAIL_TRANSPORT_DEFAULT_URL', null),
                  ],
              ],
          ];
          APPLOCAL

      - name: Install Composer dependencies
        run: cd app && composer install --no-interaction --prefer-dist

      - name: Build frontend assets
        if: matrix.database.type == 'mysql'
        run: |
          cd app
          npm install --no-audit --no-fund
          npm run dev

      - name: Prepare CI runtime
        run: chmod 0755 app/tmp

      - name: Create default database (MariaDB)
        if: matrix.database.type == 'mysql'
        run: mysql -h 127.0.0.1 -P 3306 -u root -proot -e "CREATE DATABASE IF NOT EXISTS kmp;"

      - name: Create default database (Postgres)
        if: matrix.database.type == 'postgres'
        run: >-
          PGPASSWORD=root psql -h 127.0.0.1 -U root -d kmp_test -v ON_ERROR_STOP=1
          -c "CREATE DATABASE kmp;"

      - name: Run PHPUnit tests
        run: |
          cd app
          if [ "${{ matrix.database.type }}" = "postgres" ]; then
            # Postgres job validates cross-DB compatibility for core app logic.
            # Full suite currently depends on MySQL dev seed data.
            vendor/bin/phpunit --testsuite core-unit --no-coverage --log-junit ../test-results/junit.xml
          else
            vendor/bin/phpunit --testsuite all --no-coverage --log-junit ../test-results/junit.xml
          fi

      - name: Enforce skipped-test budget
        run: cd app && bash bin/enforce_skip_budget.sh

      - name: Upload test results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-results-${{ matrix.database.type }}
          path: test-results/junit.xml

      - name: Report test results
        if: success() || failure()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/junit.xml
          check_name: PHPUnit Test Results (${{ matrix.database.type }})
          comment_mode: off

  jest:
    name: Jest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Node dependencies
        run: cd app && npm install --no-audit --no-fund

      - name: Run Jest tests
        run: |
          mkdir -p test-results
          cd app
          npm run test:js -- --ci --runInBand --json --outputFile=../test-results/jest-results.json

      - name: Validate workflow definition JSON
        run: cd app && npm run validate:workflows

      - name: Upload Jest results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: test-results/jest-results.json

  playwright-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: http://kmp.localhost:8080
      PLAYWRIGHT_MAILPIT_URL: http://127.0.0.1:8025
      PLAYWRIGHT_SKIP_WEBSERVER: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_pgsql, gd, apcu, grpc, protobuf, yaml
          ini-values: apc.enable_cli=1
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create test .env
        run: |
          printf "%s\n" \
            "export KMP_ENV='ci'" \
            "export CACHE_ENGINE='apcu'" \
            "export KMP_SESSION_DEFAULTS='php'" \
            "export PLAYWRIGHT_USE_DOCKER_PHP='1'" \
            "export KMP_RESET_DB_ON_UP='false'" \
            "export KMP_SKIP_INITIAL_DB_SETUP='true'" \
            "export KMP_APP_URL='http://127.0.0.1:8080/livez'" \
            "export KMP_HOST_ALIASES='kmp.localhost kmp2.localhost'" \
            "export KMP_DB_DRIVER='postgres'" \
            "export POSTGRES_USER='KMPSQLDEV'" \
            "export POSTGRES_PASSWORD='kmpdevpass'" \
            "export POSTGRES_DB='KMP_DEV'" \
            "export PLATFORM_DB_DATABASE='KMP_PLATFORM'" \
            "export KMP_TENANCY_ENABLED='true'" \
            "export EMAIL_SMTP_HOST='mailpit'" \
            "export EMAIL_SMTP_PORT='1025'" \
            "export EMAIL_SMTP_USERNAME=''" \
            "export EMAIL_SMTP_PASSWORD=''" \
            > app/config/.env

      - name: Create host app config
        run: printf "<?php\nreturn [];\n" > app/config/app_local.php

      - name: Install Composer dependencies
        run: cd app && composer install --no-interaction --prefer-dist

      - name: Prepare CI runtime
        run: chmod 0755 app/tmp

      - name: Install Node dependencies
        run: cd app && npm install --no-audit --no-fund

      - name: Build frontend assets
        run: cd app && npm run dev

      - name: Build Docker test image
        run: docker build --file docker/Dockerfile.ci --tag kmp-app:dev .

      - name: Start Docker test services
        run: |
          echo "127.0.0.1 kmp.localhost kmp2.localhost" | sudo tee -a /etc/hosts
          for volume in kmp-pg-data kmp-composer-cache kmp-node-modules kmp-pgadmin-data; do
            docker volume create "$volume" >/dev/null
          done
          docker compose --env-file app/config/.env up -d --no-build app mailpit

      - name: Install Playwright browser
        run: cd app && npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: |
          bash reset_dev_database.sh
          docker compose --env-file app/config/.env up -d --no-build scheduler
          cd app
          PLAYWRIGHT_RESET_DB=0 npm run test:ui:smoke

      - name: Upload Playwright smoke artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            app/tests/ui-reports
            app/tests/ui-results

      - name: Show Docker logs
        if: failure()
        run: docker compose --env-file app/config/.env logs --no-color --tail=200 app scheduler db

      - name: Stop Docker test environment
        if: always()
        run: docker compose --env-file app/config/.env down

  playwright-journey:
    name: Playwright journey
    needs: playwright-smoke
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: http://kmp.localhost:8080
      PLAYWRIGHT_MAILPIT_URL: http://127.0.0.1:8025
      PLAYWRIGHT_SKIP_WEBSERVER: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_pgsql, gd, apcu, grpc, protobuf, yaml
          ini-values: apc.enable_cli=1
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create test .env
        run: |
          printf "%s\n" \
            "export KMP_ENV='ci'" \
            "export CACHE_ENGINE='apcu'" \
            "export KMP_SESSION_DEFAULTS='php'" \
            "export PLAYWRIGHT_USE_DOCKER_PHP='1'" \
            "export KMP_RESET_DB_ON_UP='false'" \
            "export KMP_SKIP_INITIAL_DB_SETUP='true'" \
            "export KMP_APP_URL='http://127.0.0.1:8080/livez'" \
            "export KMP_HOST_ALIASES='kmp.localhost kmp2.localhost'" \
            "export KMP_DB_DRIVER='postgres'" \
            "export POSTGRES_USER='KMPSQLDEV'" \
            "export POSTGRES_PASSWORD='kmpdevpass'" \
            "export POSTGRES_DB='KMP_DEV'" \
            "export PLATFORM_DB_DATABASE='KMP_PLATFORM'" \
            "export KMP_TENANCY_ENABLED='true'" \
            "export EMAIL_SMTP_HOST='mailpit'" \
            "export EMAIL_SMTP_PORT='1025'" \
            "export EMAIL_SMTP_USERNAME=''" \
            "export EMAIL_SMTP_PASSWORD=''" \
            > app/config/.env

      - name: Create host app config
        run: printf "<?php\nreturn [];\n" > app/config/app_local.php

      - name: Install Composer dependencies
        run: cd app && composer install --no-interaction --prefer-dist

      - name: Prepare CI runtime
        run: chmod 0755 app/tmp

      - name: Install Node dependencies
        run: cd app && npm install --no-audit --no-fund

      - name: Build frontend assets
        run: cd app && npm run dev

      - name: Build Docker test image
        run: docker build --file docker/Dockerfile.ci --tag kmp-app:dev .

      - name: Start Docker test services
        run: |
          echo "127.0.0.1 kmp.localhost kmp2.localhost" | sudo tee -a /etc/hosts
          for volume in kmp-pg-data kmp-composer-cache kmp-node-modules kmp-pgadmin-data; do
            docker volume create "$volume" >/dev/null
          done
          docker compose --env-file app/config/.env up -d --no-build app mailpit

      - name: Install Playwright browser
        run: cd app && npx playwright install --with-deps chromium

      - name: Run Playwright journey tests
        run: |
          bash reset_dev_database.sh
          docker compose --env-file app/config/.env up -d --no-build scheduler
          cd app
          PLAYWRIGHT_RESET_DB=0 npm run test:ui:journey

      - name: Upload Playwright journey artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-journey-artifacts
          path: |
            app/tests/ui-reports
            app/tests/ui-results

      - name: Show Docker logs
        if: failure()
        run: docker compose --env-file app/config/.env logs --no-color --tail=200 app scheduler db

      - name: Stop Docker test environment
        if: always()
        run: docker compose --env-file app/config/.env down
