          done
          echo "Mailpit did not become ready on http://127.0.0.1:8025" >&2
          exit 1

      - name: Install Playwright browser
        run: cd app && npx playwright install --with-deps chromium

      - name: Run Playwright journey tests
        run: cd app && npm run test:ui:journey

      - name: Upload Playwright journey artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-journey-artifacts
