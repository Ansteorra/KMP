name: Release Docker Image

on:
  release:
    types: [published]

permissions:
  actions: read
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ansteorra/kmp

jobs:
  verify-promotion-source:
    name: Verify POC promotion source
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.source.outputs.channel }}
      channel_version: ${{ steps.source.outputs.channel_version }}
      digest: ${{ steps.image.outputs.digest }}
      short_sha: ${{ steps.source.outputs.short_sha }}
      source_image: ${{ steps.image.outputs.source_image }}
      source_sha: ${{ steps.source.outputs.source_sha }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Resolve and validate the release commit
        id: source
        env:
          PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?([.-][A-Za-z0-9.-]+)?$ ]]; then
            echo "Release tag must be a semantic v* tag: $RELEASE_TAG" >&2
            exit 1
          fi

          SOURCE_SHA="$(git rev-parse 'HEAD^{commit}')"
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$SOURCE_SHA" origin/main; then
            echo "Release commit $SOURCE_SHA is not on official main." >&2
            exit 1
          fi

          CHANGELOG_VERSION="$(
            awk '/^## KMP [0-9]+\.[0-9]+(\.[0-9]+)? / { print $3; exit }' app/CHANGELOG.md
          )"
          TAG_VERSION="${RELEASE_TAG#v}"
          if [[ "${TAG_VERSION%%-*}" != "$CHANGELOG_VERSION" ]]; then
            echo "Release tag $RELEASE_TAG does not match changelog version $CHANGELOG_VERSION." >&2
            exit 1
          fi

          if [[ "$PRERELEASE" == "true" ]]; then
            CHANNEL="beta"
          else
            CHANNEL="latest"
          fi
          if [[ "$TAG_VERSION" == "$CHANNEL"-* ]]; then
            CHANNEL_VERSION="$TAG_VERSION"
          else
            CHANNEL_VERSION="${CHANNEL}-${TAG_VERSION}"
          fi

          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "channel_version=$CHANNEL_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SOURCE_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

      - name: Require successful main quality gates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: .github/scripts/require-workflow-success.sh tests.yml "$SOURCE_SHA" main push 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve the POC-validated image digest
        id: image
        env:
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail
          EVIDENCE_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:poc-validated-${SOURCE_SHA:0:12}"
          DIGEST="$(
            docker buildx imagetools inspect \
              "$EVIDENCE_IMAGE" \
              --format '{{.Manifest.Digest}}'
          )"
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Unable to resolve the POC-validated digest from $EVIDENCE_IMAGE" >&2
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "source_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}" >> "$GITHUB_OUTPUT"

  promote-image:
    name: Promote POC-validated image
    needs: verify-promotion-source
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Extract release tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=sha-${{ needs.verify-promotion-source.outputs.short_sha }}
            type=raw,value=${{ needs.verify-promotion-source.outputs.channel }}
            type=raw,value=${{ needs.verify-promotion-source.outputs.channel_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply release tags without rebuilding
        env:
          EXPECTED_DIGEST: ${{ needs.verify-promotion-source.outputs.digest }}
          RELEASE_TAGS: ${{ steps.meta.outputs.tags }}
          SOURCE_IMAGE: ${{ needs.verify-promotion-source.outputs.source_image }}
        run: |
          set -euo pipefail
          tag_args=()
          while IFS= read -r tag; do
            if [[ -n "$tag" ]]; then
              tag_args+=(--tag "$tag")
            fi
          done <<< "$RELEASE_TAGS"
          if [[ "${#tag_args[@]}" -eq 0 ]]; then
            echo "No release image tags were generated." >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "$SOURCE_IMAGE"

          while IFS= read -r tag; do
            if [[ -z "$tag" ]]; then
              continue
            fi
            ACTUAL_DIGEST="$(
              docker buildx imagetools inspect \
                "$tag" \
                --format '{{.Manifest.Digest}}'
            )"
            if [[ "$ACTUAL_DIGEST" != "$EXPECTED_DIGEST" ]]; then
              echo "Promoted tag $tag resolved to $ACTUAL_DIGEST, expected $EXPECTED_DIGEST" >&2
              exit 1
            fi
          done <<< "$RELEASE_TAGS"

  attach-digest:
    name: Attach promoted image digest
    needs: [verify-promotion-source, promote-image]
    runs-on: ubuntu-latest
    steps:
      - name: Create digest file
        env:
          IMAGE_DIGEST: ${{ needs.verify-promotion-source.outputs.digest }}
        run: |
          echo "$IMAGE_DIGEST" > kmp-image-digest.txt
          echo "Image digest: $IMAGE_DIGEST"

      - name: Upload digest to release
        uses: softprops/action-gh-release@v2
        with:
          files: kmp-image-digest.txt

  prepare-production-deploy:
    name: Prepare production promotion
    needs: [verify-promotion-source, promote-image]
    if: >-
      ${{ needs.verify-promotion-source.result == 'success'
          && needs.promote-image.result == 'success'
          && github.event.release.prerelease == false
          && startsWith(github.event.release.tag_name, 'v') }}
    runs-on: ubuntu-latest
    outputs:
      source_image: ${{ steps.image.outputs.source_image }}
      target_tag: ${{ steps.image.outputs.target_tag }}
    steps:
      - name: Select the promoted digest
        id: image
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          SOURCE_IMAGE: ${{ needs.verify-promotion-source.outputs.source_image }}
        run: |
          set -euo pipefail
          SAFE_TAG="$(printf '%s' "$RELEASE_TAG" | tr -c 'A-Za-z0-9_.-' '-')"
          echo "source_image=$SOURCE_IMAGE" >> "$GITHUB_OUTPUT"
          echo "target_tag=release-${SAFE_TAG}" >> "$GITHUB_OUTPUT"

  deploy-production:
    name: Deploy production
    needs: prepare-production-deploy
    permissions:
      contents: read
      id-token: write
      packages: read
    uses: ./.github/workflows/azure-deploy.yml
    with:
      environment_name: production
      source_image: ${{ needs.prepare-production-deploy.outputs.source_image }}
      target_tag: ${{ needs.prepare-production-deploy.outputs.target_tag }}
      checkout_ref: ${{ github.event.release.tag_name }}
