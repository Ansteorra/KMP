name: POC / Deploy to Azure

on:
  workflow_run:
    workflows: ["Nightly / Dev Docker Image"]
    types: [completed]
    branches: [dev]
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR tag to deploy
        required: false
        default: dev

permissions:
  contents: read
  packages: read

concurrency:
  group: azure-poc-dispatch
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve POC image
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      evidence_tag: ${{ steps.image.outputs.evidence_tag }}
      source_image: ${{ steps.image.outputs.source_image }}
      source_sha: ${{ steps.image.outputs.source_sha }}
      target_tag: ${{ steps.image.outputs.target_tag }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve immutable source and target tags
        id: image
        env:
          EVENT_NAME: ${{ github.event_name }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'dev' }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            SHA="$WORKFLOW_RUN_HEAD_SHA"
            SOURCE_TAG="dev-${SHA:0:7}"
            TARGET_TAG="poc-${SHA:0:12}"
            EVIDENCE_TAG="poc-validated-${SHA:0:12}"
          else
            SHA=""
            SOURCE_TAG="$IMAGE_TAG"
            SAFE_TAG="$(printf '%s' "$SOURCE_TAG" | tr -c 'A-Za-z0-9_.-' '-')"
            TARGET_TAG="poc-${SAFE_TAG}-${GITHUB_RUN_ID}"
            EVIDENCE_TAG=""
          fi

          SOURCE_TAGGED_IMAGE="ghcr.io/ansteorra/kmp:${SOURCE_TAG}"
          DIGEST="$(
            docker buildx imagetools inspect \
              "$SOURCE_TAGGED_IMAGE" \
              --format '{{.Manifest.Digest}}'
          )"
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Unable to resolve an immutable digest for $SOURCE_TAGGED_IMAGE" >&2
            exit 1
          fi

          echo "evidence_tag=$EVIDENCE_TAG" >> "$GITHUB_OUTPUT"
          echo "source_image=ghcr.io/ansteorra/kmp@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy POC
    needs: prepare
    permissions:
      contents: read
      id-token: write
      packages: read
    uses: ./.github/workflows/azure-deploy.yml
    with:
      environment_name: poc
      source_image: ${{ needs.prepare.outputs.source_image }}
      target_tag: ${{ needs.prepare.outputs.target_tag }}
      checkout_ref: main

  record-poc-evidence:
    name: Record POC-validated digest
    needs: [prepare, deploy]
    if: ${{ needs.deploy.result == 'success' && needs.prepare.outputs.evidence_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag the successfully deployed digest
        env:
          EVIDENCE_TAG: ${{ needs.prepare.outputs.evidence_tag }}
          SOURCE_IMAGE: ${{ needs.prepare.outputs.source_image }}
        run: |
          set -euo pipefail
          EVIDENCE_IMAGE="ghcr.io/ansteorra/kmp:${EVIDENCE_TAG}"
          docker buildx imagetools create --tag "$EVIDENCE_IMAGE" "$SOURCE_IMAGE"

          EXPECTED_DIGEST="${SOURCE_IMAGE##*@}"
          ACTUAL_DIGEST="$(
            docker buildx imagetools inspect \
              "$EVIDENCE_IMAGE" \
              --format '{{.Manifest.Digest}}'
          )"
          if [[ "$ACTUAL_DIGEST" != "$EXPECTED_DIGEST" ]]; then
            echo "POC evidence digest $ACTUAL_DIGEST does not match $EXPECTED_DIGEST" >&2
            exit 1
          fi
          echo "Recorded $EVIDENCE_IMAGE at $ACTUAL_DIGEST"
