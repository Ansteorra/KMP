name: POC / Deploy to Azure

on:
  workflow_run:
    workflows: ["Nightly / Dev Docker Image"]
    types: [completed]
    branches: [dev]
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR tag to deploy
        required: false
        default: dev

permissions:
  contents: read
  id-token: write
  packages: read

concurrency:
  group: azure-poc-dispatch
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve POC image
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      source_image: ${{ steps.image.outputs.source_image }}
      target_tag: ${{ steps.image.outputs.target_tag }}
    steps:
      - name: Resolve immutable source and target tags
        id: image
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
            SOURCE_TAG="dev-${SHA:0:7}"
            TARGET_TAG="poc-${SHA:0:12}"
          else
            SOURCE_TAG="${{ github.event.inputs.image_tag || 'dev' }}"
            SAFE_TAG="$(printf '%s' "$SOURCE_TAG" | tr -c 'A-Za-z0-9_.-' '-')"
            TARGET_TAG="poc-${SAFE_TAG}-${GITHUB_RUN_ID}"
          fi
          echo "source_image=ghcr.io/ansteorra/kmp:${SOURCE_TAG}" >> "$GITHUB_OUTPUT"
          echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy POC
    needs: prepare
    uses: ./.github/workflows/azure-deploy.yml
    with:
      environment_name: poc
      source_image: ${{ needs.prepare.outputs.source_image }}
      target_tag: ${{ needs.prepare.outputs.target_tag }}
      checkout_ref: main
    secrets: inherit
