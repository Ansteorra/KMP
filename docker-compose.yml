# KMP Development Environment - Docker Compose
# Optimized for agentic/hosted development with local code mounting
#
# Usage:
#   docker compose up -d        # Start all services
#   docker compose down         # Stop all services
#   docker compose logs -f app  # Follow app logs
#   ./dev-reset-db.sh           # Reset database to clean state
#
# Services:
#   - app: PHP 8.3 + Apache (your code mounted at /var/www/html)
#   - worker: Queue worker process using the app image
#   - scheduler: Workflow/scheduled task loop using the app image
#   - db: PostgreSQL with persistent volume
#   - pgadmin: PostgreSQL administration UI (development only)
#   - mailpit: Email testing (UI at http://localhost:8025)

name: kmp

x-app-base: &app-base
  image: kmp-app:dev
  build:
    context: .
    dockerfile: docker/Dockerfile.app
  env_file:
    - path: app/config/.env
      required: false
  depends_on:
    db:
      condition: service_healthy
    mailpit:
      condition: service_started
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ./app:/var/www/html:cached
    - ./dev_seed_clean.sql:/var/www/dev_seed_clean.sql:ro
    - composer-cache:/root/.composer/cache
    - node-modules:/var/www/html/node_modules
  environment: &app-environment
    APP_NAME: KMP_DOCKER
    KMP_ENV: ${KMP_ENV:-local}
    KMP_DB_DRIVER: postgres
    DB_HOST: db
    DB_PORT: "5432"
    DB_USERNAME: ${POSTGRES_USER:-KMPSQLDEV}
    DB_PASSWORD: ${POSTGRES_PASSWORD:-kmpdevpass}
    DB_DATABASE: ${POSTGRES_DB:-KMP_DEV}
    DATABASE_URL: postgres://${POSTGRES_USER:-KMPSQLDEV}:${POSTGRES_PASSWORD:-kmpdevpass}@db:5432/${POSTGRES_DB:-KMP_DEV}
    DATABASE_TEST_URL: postgres://${POSTGRES_USER:-KMPSQLDEV}:${POSTGRES_PASSWORD:-kmpdevpass}@db:5432/${POSTGRES_DB:-KMP_DEV}_test
    PLATFORM_DB_HOST: db
    PLATFORM_DB_PORT: "5432"
    PLATFORM_DB_USERNAME: ${POSTGRES_USER:-KMPSQLDEV}
    PLATFORM_DB_PASSWORD: ${POSTGRES_PASSWORD:-kmpdevpass}
    PLATFORM_DB_DATABASE: ${PLATFORM_DB_DATABASE:-KMP_PLATFORM}
    PLATFORM_DATABASE_URL: postgres://${POSTGRES_USER:-KMPSQLDEV}:${POSTGRES_PASSWORD:-kmpdevpass}@db:5432/${PLATFORM_DB_DATABASE:-KMP_PLATFORM}
    PLATFORM_DATABASE_TEST_URL: postgres://${POSTGRES_USER:-KMPSQLDEV}:${POSTGRES_PASSWORD:-kmpdevpass}@db:5432/${PLATFORM_DB_TEST_DATABASE:-KMP_PLATFORM_test}
    KMP_TENANCY_ENABLED: ${KMP_TENANCY_ENABLED:-true}
    KMP_REQUIRED_SCHEMA_VERSION: "${KMP_REQUIRED_SCHEMA_VERSION:-}"
    KMP_PLATFORM_ADMIN_PORTAL_ENABLED: ${KMP_PLATFORM_ADMIN_PORTAL_ENABLED:-false}
    KMP_PLATFORM_ADMIN_HOSTS: ${KMP_PLATFORM_ADMIN_HOSTS:-platform.kmp.localhost}
    KMP_PLATFORM_ADMIN_ALLOWED_STATUSES: ${KMP_PLATFORM_ADMIN_ALLOWED_STATUSES:-active}
    KMP_AUTO_CREATE_DATABASES: ${KMP_AUTO_CREATE_DATABASES:-true}
    EMAIL_SMTP_HOST: mailpit
    EMAIL_SMTP_PORT: "1025"
    EMAIL_SMTP_USERNAME: ""
    EMAIL_SMTP_PASSWORD: ""
    XDEBUG_MODE: ${XDEBUG_MODE:-debug,develop}
    XDEBUG_CONFIG: "client_host=${XDEBUG_CLIENT_HOST:-host.docker.internal} client_port=${XDEBUG_CLIENT_PORT:-9003}"
    PHP_IDE_CONFIG: "serverName=${PHP_IDE_SERVER_NAME:-KMP-Docker}"
    KMP_APP_PORT: ${KMP_APP_PORT:-8080}
    KMP_DEV_TENANT_HOST: ${KMP_DEV_TENANT_HOST:-kmp.localhost}
    KMP_DB_HOST_PORT: ${KMP_DB_HOST_PORT:-5432}
    KMP_MAILPIT_WEB_PORT: ${KMP_MAILPIT_WEB_PORT:-8025}
    PHP_MEMORY_LIMIT: 256M
    KMP_SCHEDULER_POLL_INTERVAL: ${KMP_SCHEDULER_POLL_INTERVAL:-10}
    KMP_WORKFLOW_SCHEDULER_INTERVAL: ${KMP_WORKFLOW_SCHEDULER_INTERVAL:-60}
    KMP_ACTIVE_WINDOW_SYNC_INTERVAL: ${KMP_ACTIVE_WINDOW_SYNC_INTERVAL:-900}
    KMP_MEMBER_WARRANTABLE_SYNC_INTERVAL: ${KMP_MEMBER_WARRANTABLE_SYNC_INTERVAL:-86400}
    KMP_AGE_UP_MEMBERS_INTERVAL: ${KMP_AGE_UP_MEMBERS_INTERVAL:-86400}
    KMP_BACKUP_CHECK_INTERVAL: ${KMP_BACKUP_CHECK_INTERVAL:-86400}

services:
  db:
    image: postgres:16
    container_name: kmp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-KMP_DEV}
      POSTGRES_USER: ${POSTGRES_USER:-KMPSQLDEV}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kmpdevpass}
    ports:
      - "${KMP_DB_BIND_ADDR:-127.0.0.1}:${KMP_DB_HOST_PORT:-5432}:5432"
    volumes:
      - kmp-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-KMPSQLDEV} -d ${POSTGRES_DB:-KMP_DEV}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kmp-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${KMP_PGADMIN_BIND_ADDR:-127.0.0.1}:${KMP_PGADMIN_PORT:-5050}:80"
    volumes:
      - kmp-pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    environment:
      PGADMIN_DEFAULT_EMAIL: ${KMP_PGADMIN_EMAIL:-admin@kmpdev.org}
      PGADMIN_DEFAULT_PASSWORD: ${KMP_PGADMIN_PASSWORD:-kmpdevpass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kmpdevpass}
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGADMIN_DISABLE_POSTFIX: "true"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: "30"

  mailpit:
    image: axllent/mailpit:latest
    container_name: kmp-mailpit
    restart: unless-stopped
    ports:
      - "${KMP_MAILPIT_BIND_ADDR:-127.0.0.1}:${KMP_MAILPIT_WEB_PORT:-8025}:8025"  # Web UI
      - "${KMP_MAILPIT_BIND_ADDR:-127.0.0.1}:${KMP_MAILPIT_SMTP_PORT:-1025}:1025"  # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  app:
    <<: *app-base
    container_name: kmp-app
    restart: unless-stopped
    ports:
      - "${KMP_APP_BIND_ADDR:-127.0.0.1}:${KMP_APP_PORT:-8080}:80"
    environment:
      <<: *app-environment
      KMP_SKIP_CRON: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H \"Host: $${KMP_DEV_TENANT_HOST:-kmp.localhost}\" http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    <<: *app-base
    container_name: kmp-worker
    restart: unless-stopped
    command: ["bin/cake", "queue", "run", "-q"]
    environment:
      <<: *app-environment
      KMP_SKIP_CRON: "true"
    stop_grace_period: 45s

  scheduler:
    <<: *app-base
    container_name: kmp-scheduler
    restart: unless-stopped
    command: ["kmp-scheduler-loop"]
    environment:
      <<: *app-environment
      KMP_SKIP_CRON: "true"
    stop_grace_period: 30s

volumes:
  kmp-pg-data:
    name: kmp-pg-data
    external: true
  composer-cache:
    name: kmp-composer-cache
    external: true
  node-modules:
    name: kmp-node-modules
    external: true
  kmp-pgadmin-data:
    name: kmp-pgadmin-data
    external: true
